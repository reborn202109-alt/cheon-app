<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <!-- 그룹 프로젝트는 제목 전용, 주기와 기록은 카테고리에서 관리 -->
<title>천 쑥과마늘</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0a;--bg2:#141414;--bg3:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--text2:#888;--text3:#444;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;}
    button{font-family:inherit;cursor:pointer;}
    .btn-primary{background:var(--text);color:var(--bg);border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;width:100%;}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 20px;font-size:14px;}
    .btn-danger{background:none;border:1px solid #f87171;color:#f87171;border-radius:10px;padding:12px;font-size:14px;width:100%;margin-top:10px;}
    input{background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:12px 14px;font-family:inherit;outline:none;width:100%;}
    input:focus{border-color:#555;}
    input[type=color]{padding:4px;height:42px;cursor:pointer;}

    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:100;}
    .nav-btn{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;}
    .nav-icon{font-size:20px;}
    .nav-label{font-size:10px;color:var(--text3);}
    .nav-btn.active .nav-label{color:var(--text);font-weight:700;}
    .nav-btn:not(.active) .nav-icon{opacity:.3;}
    .main-content{padding:0 0 80px;}

    /* 홈 */
    .home-header{padding:48px 24px 20px;}
    .home-title{font-size:26px;font-weight:900;letter-spacing:-1px;}
    .list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
    .add-dashed{margin:8px 16px 0;background:none;border:1px dashed var(--border);color:var(--text2);border-radius:14px;padding:14px;width:calc(100% - 32px);font-size:14px;}

    .project-card{transition:transform .16s ease,opacity .16s ease,box-shadow .16s ease;}
    .project-card.dragging{opacity:.58;box-shadow:0 14px 36px rgba(0,0,0,.45);transform:scale(.985);position:relative;z-index:999;-webkit-user-select:none;user-select:none;}
    .drag-handle{width:32px;height:38px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text3);font-size:20px;font-weight:900;touch-action:none;cursor:grab;flex-shrink:0;letter-spacing:-4px;padding:0 6px 0 0;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
    .drag-handle:active{cursor:grabbing;color:var(--text2);}

    /* 카드/행 */
    .card{background:var(--bg2);border-radius:14px;border:1px solid var(--border);overflow:hidden;}
    .row{display:flex;align-items:center;gap:8px;padding:13px 14px;}
    .cbar{width:3px;height:20px;border-radius:2px;flex-shrink:0;}
    .rinfo{flex:1;min-width:0;}
    .rname{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0;}
    .bg{background:#1a2e1a;color:#4ade80;}
    .bb{background:#2e1a1a;color:#f87171;}
    .ebtn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:11px;padding:3px 8px;border-radius:6px;flex-shrink:0;}
    .ebtn:active{color:var(--text);}
    .togbtn{background:none;border:none;color:var(--text3);font-size:11px;padding:4px;transition:transform .2s;flex-shrink:0;}
    .togbtn.open{transform:rotate(180deg);}
    .chk{width:30px;height:30px;border-radius:8px;border:2px solid var(--border);background:none;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:transparent;transition:all .15s;flex-shrink:0;}
    .chk.done{color:#fff;}
    .chk.done-bad{background:#4ade80!important;border-color:#4ade80!important;color:#000;}
    .subitems{border-top:1px solid var(--border);}
    .subrow{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--bg3);}
    .subrow:last-of-type{border-bottom:none;}
    .sinfo{flex:1;min-width:0;}
    .sname{font-size:14px;}
    .sname.done{color:var(--text3);text-decoration:line-through;}
    .add-sub-btn{display:block;width:calc(100% - 28px);margin:8px 14px;background:none;border:1px dashed var(--border);color:var(--text2);border-radius:8px;padding:9px;font-size:12px;}

    /* 상세 */
    .dheader{padding:48px 24px 16px;display:flex;align-items:center;gap:12px;}
    .backbtn{background:var(--bg3);border:none;color:var(--text);font-size:18px;padding:8px 12px;border-radius:10px;}
    .dtitle-wrap{flex:1;}
    .ddot-row{display:flex;align-items:center;gap:10px;}
    .ddot{width:10px;height:10px;border-radius:50%;}
    .dname{font-size:20px;font-weight:700;}
    .dsub{font-size:11px;color:var(--text2);margin-top:3px;}
    .daddbtn{background:var(--bg3);border:none;color:var(--text);font-size:20px;padding:8px 12px;border-radius:10px;}
    .sumbox{margin:0 16px 16px;background:var(--bg2);border-radius:14px;padding:16px;border:1px solid var(--border);}
    .sumrow{display:flex;justify-content:space-between;margin-bottom:8px;}
    .sumrow:last-child{margin-bottom:0;}
    .sumlbl{font-size:13px;color:var(--text2);}
    .sumval{font-size:13px;font-weight:700;}
    .barbg{background:var(--bg3);border-radius:4px;height:4px;overflow:hidden;}
    .barfill{height:100%;border-radius:4px;transition:width .4s;}
    .tsec{padding:0 16px 24px;}
    .slbl{font-size:11px;color:var(--text2);letter-spacing:.5px;margin-bottom:10px;}

    /* 통계 */
    .sh{padding:48px 24px 20px;}
    .st{font-size:24px;font-weight:900;}
    .sc{padding:0 16px;}
    .stcard{background:var(--bg2);border-radius:14px;padding:18px;margin-bottom:10px;border:1px solid var(--border);}
    .stch{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .stpn{font-size:16px;font-weight:700;}
    .std{font-size:12px;color:var(--text2);margin-left:auto;}
    .sthr{margin-bottom:12px;}
    .sthrt{display:flex;justify-content:space-between;margin-bottom:3px;}
    .sthn{font-size:13px;}
    .strate{font-size:13px;font-weight:700;}
    .sthd{font-size:11px;color:var(--text3);margin-bottom:5px;}
    .dashgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .dashitem{background:var(--bg3);border-radius:10px;padding:12px;}
    .dashlbl{font-size:11px;color:var(--text2);margin-bottom:4px;}
    .dashval{font-size:19px;font-weight:900;}
    .statusline{font-size:12px;color:var(--text2);margin-top:5px;line-height:1.5;}
    .statuswarn{color:#fbbf24;}
    .statusok{color:#4ade80;}
    .statusfail{color:#f87171;}
    .miniheat{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-top:8px;}
    .heatday{width:22px;height:22px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);}
    .heatday.ok{background:#18351f;border-color:#285b35;color:#6ee7a0;}
    .heatday.fail{background:#351b1b;border-color:#5f2b2b;color:#fca5a5;}
    .heatday.off{opacity:.35;}
    .rankrow{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
    .rankrow:last-child{border-bottom:none;}
    .ranknum{width:22px;color:var(--text2);font-size:12px;}
    .rankname{flex:1;font-size:13px;}
    .rankval{font-size:13px;font-weight:700;}
    .catstat{padding:10px 0;border-top:1px solid var(--border);}
    .catstat:first-of-type{border-top:none;}
    .catstathead{display:flex;align-items:center;gap:7px;}
    .catstatname{font-size:13px;font-weight:700;flex:1;}
    .catstatnums{font-size:11px;color:var(--text2);}
    .reportbox{border-radius:10px;padding:11px 12px;margin:10px 0;font-size:12px;line-height:1.55;}
    .reportok{background:#142c1b;border:1px solid #245333;color:#86efac;}
    .reportfail{background:#321919;border:1px solid #653030;color:#fca5a5;}
    .reporttitle{font-weight:800;margin-bottom:5px;}
    .reportmissing{color:#fecaca;}
    .reportsub{margin-top:6px;color:var(--text2);}
    .failrank{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
    .failrank:last-child{border-bottom:none;}
    .failname{flex:1;font-size:13px;}
    .failcount{font-size:12px;font-weight:800;color:#fca5a5;}
    .stat-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;position:sticky;top:0;z-index:20;background:var(--bg);padding:4px 0 8px;}
    .stat-tab{border:1px solid var(--border);background:var(--bg2);color:var(--text3);border-radius:10px;padding:10px 4px;font-size:12px;font-weight:800;}
    .stat-tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
    .stat-panel{display:none;}
    .stat-panel.active{display:block;}
    .project-list-btn{width:100%;display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;color:var(--text);text-align:left;}
    .project-list-btn .project-list-name{font-size:14px;font-weight:800;flex:1;}
    .project-list-btn .project-list-stat{font-size:11px;color:var(--text2);}
    .project-list-btn .project-arrow{font-size:18px;color:var(--text3);transition:transform .18s ease;}
    .project-list-btn.open .project-arrow{transform:rotate(90deg);}
    .project-detail{display:none;margin-top:-2px;margin-bottom:10px;}
    .project-detail.open{display:block;}




    /* 설정 */
    .seth{padding:48px 24px 20px;}
    .sett{font-size:24px;font-weight:900;}
    .setc{padding:0 16px;}
    .setsec{margin-bottom:20px;}
    .setst{font-size:11px;color:var(--text2);letter-spacing:1px;margin-bottom:6px;padding:0 4px;}
    .seti{background:var(--bg2);border-radius:12px;padding:14px 16px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);}
    .setil{font-size:15px;}
    .setiv{font-size:13px;color:var(--text2);}

    /* 모달 */
    .moverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
    .moverlay.open{display:flex;}
    .modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:24px 24px 40px;width:100%;max-width:480px;margin:0 auto;border-top:1px solid var(--border);animation:sup .25s ease;}
    @keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .mtitle{font-size:18px;font-weight:700;margin-bottom:20px;}
    .mfield{margin-bottom:14px;}
    .mlbl{font-size:12px;color:var(--text2);margin-bottom:6px;}
    .mbtns{display:flex;gap:8px;margin-top:20px;}
    .freqs{display:flex;gap:6px;flex-wrap:wrap;}
    .fopt{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;}
    .fopt.sel{background:var(--text);color:var(--bg);border-color:var(--text);}
    .days{display:flex;gap:6px;}
    .dopt{flex:1;padding:8px 0;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;text-align:center;}
    .dopt.sel{background:var(--text);color:var(--bg);border-color:var(--text);}
    .topts{display:flex;gap:8px;}
    .topt{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--text2);font-size:13px;text-align:center;}
    .topt.sel{background:var(--text);color:var(--bg);border-color:var(--text);}
    .cpick{display:flex;align-items:center;gap:12px;}
    .cprev{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;}
    .empty{text-align:center;padding:60px 24px;color:var(--text3);font-size:14px;line-height:1.8;}
    .totop{position:fixed;bottom:90px;right:20px;width:42px;height:42px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:18px;display:none;align-items:center;justify-content:center;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;}
    .totop.show{display:flex;}

    /* 마일스톤 */
    .ms-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--bg2);border-radius:20px;padding:32px 40px;text-align:center;z-index:300;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:all .3s;max-width:320px;width:90%;}
    .mspop.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
    .msemoji{font-size:48px;margin-bottom:12px;}
    .mstitle{font-size:20px;font-weight:900;margin-bottom:6px;}
    .msdesc{font-size:14px;color:var(--text2);line-height:1.6;white-space:pre-line;}
  
    .state-actions{display:flex;gap:6px;align-items:center}
    .failbtn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:transparent;color:var(--text3);font-size:16px;font-weight:900;display:flex;align-items:center;justify-content:center}
    .failbtn.active{background:#7f1d1d;border-color:#ef4444;color:#fff}
    .reason-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    .reason-chip{border:1px solid var(--border);background:var(--bg3);color:var(--text2);border-radius:10px;padding:10px 8px;font-size:13px;font-weight:700}
    .reason-chip.sel{border-color:#ef4444;background:rgba(239,68,68,.14);color:#fca5a5}
    .failure-note{margin-top:8px;padding:10px 12px;border-radius:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);font-size:12px;line-height:1.55;color:var(--text2)}
    .failure-note b{color:#fca5a5}
    .day-history{margin-top:10px;display:flex;flex-direction:column;gap:8px}
    .history-item{padding:11px 12px;border-radius:11px;background:var(--bg3);border:1px solid var(--border)}
    .history-head{display:flex;justify-content:space-between;gap:10px;font-size:13px;font-weight:800}
    .history-reason{margin-top:5px;font-size:12px;color:var(--text2);line-height:1.5}
    .import-list{display:flex;flex-direction:column;gap:8px;max-height:42vh;overflow:auto}
    .import-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:11px}
    .import-item input{width:20px;height:20px;flex-shrink:0}
    .import-name{font-size:14px;font-weight:800;flex:1}
    .import-meta{font-size:11px;color:var(--text2);margin-top:3px}
    .import-empty{text-align:center;color:var(--text3);font-size:13px;padding:28px 10px;line-height:1.7}
    .scheduled-badge{display:inline-flex;align-items:center;gap:4px;background:#2b2414;color:#fbbf24;border:1px solid #594821;border-radius:6px;padding:3px 7px;font-size:11px;font-weight:800}
    .scheduled-card{opacity:.72}

</style>
</head>
<body>
<div id="app">
  <div class="main-content">
    <div id="vh"><!-- 홈 --></div>
    <div id="vd" style="display:none"><!-- 상세 --></div>
    <div id="vs" style="display:none"><div class="sh"><div class="st">통계</div></div><div class="sc" id="sc"></div></div>
    <div id="vset" style="display:none"><div class="seth"><div class="sett">설정</div></div><div class="setc" id="setc"></div></div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" id="nh"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
    <button class="nav-btn" id="ns"><span class="nav-icon">📊</span><span class="nav-label">통계</span></button>
    <button class="nav-btn" id="nset"><span class="nav-icon">⚙️</span><span class="nav-label">설정</span></button>
  </div>
</div>

<button class="totop" id="totop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<div class="ms-popup mspop" id="mspop" style="display:none">
  <div class="msemoji" id="msemoji"></div>
  <div class="mstitle" id="mstitle"></div>
  <div class="msdesc" id="msdesc"></div>
  <button class="btn-primary" style="margin-top:20px" onclick="document.getElementById('mspop').style.display='none'">확인</button>
</div>

<!-- 프로젝트 모달 -->
<div class="moverlay" id="mp">
  <div class="modal">
    <div class="mtitle" id="mpt">새 프로젝트</div>
    <div class="mfield"><div class="mlbl">이름</div><input id="mpn" placeholder="예: 독서, 금연"/></div>
    <div class="mfield" id="mptitleonly" style="display:none"><div class="import-empty" style="padding:10px 4px">이 프로젝트는 카테고리를 묶는 제목입니다.<br>주기와 체크 기록은 아래 카테고리에서 관리됩니다.</div></div>
    <div class="mfield" id="mptypefield"><div class="mlbl">종류</div>
      <div class="topts" id="mptyp">
        <button class="topt sel" data-v="good">✓ 좋은 습관</button>
        <button class="topt" data-v="bad">✗ 나쁜 습관 끊기</button>
      </div>
    </div>
    <div class="mfield" id="mpfreqfield"><div class="mlbl">주기</div>
      <div class="freqs" id="mpfrq">
        <button class="fopt sel" data-v="1">매일</button>
        <button class="fopt" data-v="2">격일</button>
        <button class="fopt" data-v="3">3일마다</button>
        <button class="fopt" data-v="4">4일마다</button>
        <button class="fopt" data-v="7">주1회</button>
      </div>
    </div>
    <div class="mfield" id="mpdaysfield"><div class="mlbl">요일 (선택시 주기 무시)</div>
      <div class="days" id="mpdays">
        <button class="dopt" data-v="0">일</button>
        <button class="dopt" data-v="1">월</button>
        <button class="dopt" data-v="2">화</button>
        <button class="dopt" data-v="3">수</button>
        <button class="dopt" data-v="4">목</button>
        <button class="dopt" data-v="5">금</button>
        <button class="dopt" data-v="6">토</button>
      </div>
    </div>
    <div class="mfield"><div class="mlbl">색상</div>
      <div class="cpick"><div class="cprev" id="mpcprev"></div><input type="color" id="mpclr" oninput="document.getElementById('mpcprev').style.background=this.value" style="flex:1"/></div>
    </div>
    <div class="mfield" id="mpstartfield"><div class="mlbl">시작일</div><input type="date" id="mpdt"/></div>
    <div class="mbtns">
      <button class="btn-ghost" style="flex:1" onclick="cm('mp')">취소</button>
      <button class="btn-primary" style="flex:2" id="mpok">추가</button>
    </div>
    <button class="btn-ghost" id="mpimport" style="display:none;width:100%;margin-top:10px">기존 프로젝트 가져오기</button>
    <button class="btn-danger" id="mpdel" style="display:none">삭제</button>
  </div>
</div>

<!-- 기존 프로젝트 가져오기 모달 -->
<div class="moverlay" id="mimport">
  <div class="modal">
    <div class="mtitle">기존 프로젝트 가져오기</div>
    <div class="mfield">
      <div class="mlbl">선택한 프로젝트는 현재 프로젝트의 카테고리로 이동합니다.</div>
      <div class="import-list" id="importlist"></div>
    </div>
    <div class="mbtns">
      <button class="btn-ghost" style="flex:1" onclick="cm('mimport')">취소</button>
      <button class="btn-primary" style="flex:2" id="importok">가져오기</button>
    </div>
  </div>
</div>

<!-- 카테고리 모달 -->
<div class="moverlay" id="mc">
  <div class="modal">
    <div class="mtitle" id="mct">새 카테고리</div>
    <div class="mfield"><div class="mlbl">이름</div><input id="mcn" placeholder="예: 운동, 금연, 독서"/></div>

<script>
const KEY="cheon_v8";
const LEGACY_KEYS=["cheon_v7","cheon_v6"];
const MS=[
  {d:66,e:"🌱",t:"66일 달성!",s:"습관이 몸에 배기 시작하는 시간.\n이제 진짜 내 것이 되고 있어요."},
  {d:100,e:"💯",t:"100일 달성!",s:"100일 챌린지 완성!\n꾸준함이 만들어낸 기적이에요."},
  {d:365,e:"🌟",t:"1년 달성!",s:"1년 동안 포기하지 않았어요.\n당신은 이미 달라졌습니다."},
  {d:730,e:"🔥",t:"2년 달성!",s:"2년. 이건 의지가 아니라 정체성이에요.\n습관이 당신 자체가 됐습니다."},
  {d:1000,e:"🧄",t:"사람이 되셨습니다.",s:"천일의 쑥과마늘을 다 드셨습니다.\n당신은 완전히 새로운 사람이에요."},
];
function emptyDb(){return {p:[],logs:{},ms:{},failures:{}};}
function readLocalDb(){
  for(const key of [KEY,...LEGACY_KEYS]){
    try{
      const data=JSON.parse(localStorage.getItem(key));
      if(data&&typeof data==="object"){
        if(key!==KEY)localStorage.setItem(KEY,JSON.stringify(data));
        return data;
      }
    }catch{}
  }
  return emptyDb();
}
function normalizeDb(data){
  const out=data&&typeof data==="object"?data:emptyDb();
  if(!Array.isArray(out.p))out.p=[];
  if(!out.logs||typeof out.logs!=="object")out.logs={};
  if(!out.ms||typeof out.ms!=="object")out.ms={};
  if(!out.failures||typeof out.failures!=="object")out.failures={};
  for(const p of out.p){
    if(!Array.isArray(p.cats))p.cats=[];
    for(const c of p.cats){
      if(!Array.isArray(c.subs))c.subs=[];
      for(const s of c.subs){
        if(!s.start){
          const now=new Date();
          const fallback=[now.getFullYear(),String(now.getMonth()+1).padStart(2,"0"),String(now.getDate()).padStart(2,"0")].join("-");
          s.start=c.start||p.start||fallback;
        }
      }
    }
  }
  return out;
}
let db=normalizeDb(readLocalDb());
if(!db.failures)db.failures={};
function sv(){
  db.updatedAt=new Date().toISOString();
  localStorage.setItem(KEY,JSON.stringify(db));
  syncToSupabase();
}
const uid=()=>"id"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const td=()=>{
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
};
const dd=(a,b)=>Math.floor((new Date(b)-new Date(a))/86400000);
const fd=d=>{const x=new Date(d);return`${x.getFullYear()}.${x.getMonth()+1}.${x.getDate()}`;};
// 요일 선택이 있으면 요일 기준, 없으면 freq 기준
const sd=(days,freq,start,date)=>{
  if(days&&days.length>0) return days.includes(new Date(date+"T00:00:00").getDay());
  const f=freq||1; const x=dd(start,date); return x>=0&&x%f===0;
};
const fl=(days,freq)=>{
  if(days&&days.length>0) return days.map(d=>["일","월","화","수","목","금","토"][d]).join(".");
  return ({1:"매일",2:"격일",3:"3일마다",4:"4일마다",7:"주1회"}[freq]||"매일");
};

// 요일 선택 버튼 초기화
function initDayPickers(){
  ["mpdays","mcdays","msubdays"].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.querySelectorAll(".dopt").forEach(b=>{
      b.onclick=()=>b.classList.toggle("sel");
    });
  });
}

function getDays(id){
  return Array.from(document.querySelectorAll(`#${id} .dopt.sel`)).map(b=>parseInt(b.dataset.v));
}

function setDays(id,days){
  document.querySelectorAll(`#${id} .dopt`).forEach(b=>{
    b.classList.toggle("sel",days&&days.includes(parseInt(b.dataset.v)));
  });
}

let curP=null, curC=null, curSC=null, exp={};

// 체크 가능 아이템
function gItems(proj,date){
  const ids=[];

  // 카테고리가 없는 단독 프로젝트
  if(!proj.cats || proj.cats.length===0){
    if(sd(proj.days,proj.freq||1,proj.start,date)) ids.push(proj.id);
    return ids;
  }

  // 카테고리가 있는 프로젝트
  for(const c of proj.cats){
    if(!c.subs || c.subs.length===0){
      if(sd(c.days,c.freq||1,c.start,date)) ids.push(c.id);
    } else {
      for(const s of c.subs){
        if(sd(s.days,s.freq||1,s.start,date)) ids.push(s.id);
      }
    }
  }
  return ids;
}

function localKey(d){
  return [
    d.getFullYear(),
    String(d.getMonth()+1).padStart(2,"0"),
    String(d.getDate()).padStart(2,"0")
  ].join("-");
}

function addDays(date,n){
  const d=new Date(date+"T00:00:00");
  d.setDate(d.getDate()+n);
  return localKey(d);
}

function isFutureStart(start,date=td()){return !!start&&start>date;}
function dDay(start,date=td()){return Math.max(0,dd(date,start));}
function scheduledText(start,date=td()){return `⏳ 시작 예정 · D-${dDay(start,date)}`;}

function collectItemIds(item){
  const ids=[];
  if(item?.id)ids.push(item.id);
  for(const c of (item?.cats||[]))ids.push(...collectItemIds(c));
  for(const s of (item?.subs||[]))ids.push(...collectItemIds(s));
  return ids;
}

function removeItemHistory(ids){
  const set=new Set(Array.isArray(ids)?ids:[ids]);
  for(const date of Object.keys(db.logs||{})){
    for(const id of set)delete db.logs[date][id];
    if(!Object.keys(db.logs[date]).length)delete db.logs[date];
  }
  for(const date of Object.keys(db.failures||{})){
    for(const id of set)delete db.failures[date][id];
    if(!Object.keys(db.failures[date]).length)delete db.failures[date];
  }
  for(const id of set)delete db.ms?.[id];
}

// 새 프로젝트/카테고리를 과거 시작일로 등록하면 예정된 날을 오늘까지 성공으로 자동 기록
function fillPastSuccess(item,start,days,freq){
  const end=td();
  if(!start || start>end) return;
  for(let k=start;k<=end;k=addDays(k,1)){
    if(!sd(days,freq||1,start,k)) continue;
    if(!db.logs[k]) db.logs[k]={};
    db.logs[k][item.id]=true;
    removeFailure(k,item.id);
  }
}

function itemNameMap(proj){
  const map={[proj.id]:proj.name};
  for(const c of (proj.cats||[])){
    map[c.id]=c.name;
    for(const s of (c.subs||[])) map[s.id]=s.name;
  }
  return map;
}

function targetItems(target,date){
  if(isFutureStart(targetStart(target),date))return [];
  if(target.kind==="project") return gItems(target.proj,date);
  if(target.kind==="category"){
    const c=target.cat;
    if(!c.subs || c.subs.length===0){
      return sd(c.days,c.freq||1,c.start,date)?[c.id]:[];
    }
    return c.subs.filter(s=>sd(s.days,s.freq||1,s.start,date)).map(s=>s.id);
  }
  return [];
}

function projectRealStart(proj){
  if(!proj?.cats || proj.cats.length===0) return proj?.start||td();
  const starts=[];
  for(const c of proj.cats){
    if(c.start) starts.push(c.start);
    for(const s of (c.subs||[])){
      if(s.start) starts.push(s.start);
    }
  }
  return starts.length?starts.sort()[0]:(proj.start||td());
}

function targetStart(target){
  if(target.kind==="category") return target.cat.start;
  return projectRealStart(target.proj);
}

function targetIsFuture(target,date=td()){return isFutureStart(targetStart(target),date);}

function dayStatus(target,date){
  const ids=targetItems(target,date);
  const log=db.logs[date]||{};
  const names=itemNameMap(target.proj);
  const missing=ids.filter(id=>!log[id]).map(id=>names[id]||"이름 없음");
  const done=ids.length-missing.length;
  return {
    scheduled:ids.length,
    done,
    missing,
    complete:ids.length>0&&missing.length===0
  };
}

// 현재 연속: 오늘이 아직 미완료면 오늘은 보류하고 어제까지의 연속을 유지
function currentStreak(target,endDate=td()){
  if(targetIsFuture(target,endDate))return 0;
  let s=0;
  let d=new Date(endDate+"T00:00:00");
  let firstScheduled=true;

  for(let i=0;i<1500;i++){
    const k=localKey(d);
    const st=dayStatus(target,k);

    if(!st.scheduled){
      d.setDate(d.getDate()-1);
      continue;
    }

    if(firstScheduled && endDate===td() && k===td() && !st.complete){
      firstScheduled=false;
      d.setDate(d.getDate()-1);
      continue;
    }

    firstScheduled=false;
    if(!st.complete) break;
    s++;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function bestStreak(target,endDate=td()){
  const start=targetStart(target);
  const end=endDate;
  let cur=0,best=0;
  for(let k=start;k<=end;k=addDays(k,1)){
    const st=dayStatus(target,k);
    if(!st.scheduled) continue;
    if(st.complete){
      cur++;
      if(cur>best)best=cur;
    }else{
      cur=0;
    }
  }
  return best;
}

function targetStats(target,fromDate=null,toDate=null){
  const start=fromDate&&fromDate>targetStart(target)?fromDate:targetStart(target);
  const end=toDate||td();
  let scheduledDays=0,successDays=0,scheduledItems=0,doneItems=0;

  if(start>end) return {scheduledDays:0,successDays:0,scheduledItems:0,doneItems:0,rate:0};

  for(let k=start;k<=end;k=addDays(k,1)){
    const st=dayStatus(target,k);
    if(!st.scheduled) continue;
    scheduledDays++;
    scheduledItems+=st.scheduled;
    doneItems+=st.done;
    if(st.complete)successDays++;
  }

  return {
    scheduledDays,
    successDays,
    scheduledItems,
    doneItems,
    rate:scheduledDays?Math.round(successDays/scheduledDays*100):0
  };
}

function streak(proj){
  return currentStreak({kind:"project",proj});
}

function statusMessage(target,date=td()){
  if(targetIsFuture(target,date)){
    return {cls:"statuswarn",text:scheduledText(targetStart(target),date),future:true};
  }
  const st=dayStatus(target,date);
  const isToday=date===td();
  const isPast=date<td();

  if(!st.scheduled){
    return {cls:"",text:isToday?"오늘은 예정된 습관이 없습니다.":"예정된 습관이 없던 날입니다."};
  }

  if(st.complete){
    return {
      cls:"statusok",
      text:isToday
        ?`🎉 오늘 ${st.done}/${st.scheduled} 완료 · 성공`
        :`✅ ${st.done}/${st.scheduled} 완료 · 성공`
    };
  }

  if(isPast){
    return {
      cls:"statusfail",
      text:`❌ 실패 원인: ${st.missing.join(", ")}`
    };
  }

  if(st.missing.length===1){
    return {cls:"statuswarn",text:`⚠️ ${st.missing[0]}만 완료하면 오늘 성공`};
  }

  return {cls:"statuswarn",text:`${st.done}/${st.scheduled} 완료 · 남은 습관: ${st.missing.join(", ")}`};
}

function streakBeforeDate(target,date){
  let s=0;
  let d=new Date(date+"T00:00:00");
  d.setDate(d.getDate()-1);

  for(let i=0;i<1500;i++){
    const k=localKey(d);
    const st=dayStatus(target,k);

    if(!st.scheduled){
      d.setDate(d.getDate()-1);
      continue;
    }

    if(!st.complete) break;
    s++;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function failureCounts(target,fromDate,toDate){
  const counts={};
  const start=fromDate>targetStart(target)?fromDate:targetStart(target);
  const end=toDate||td();

  if(start>end) return counts;

  for(let k=start;k<=end;k=addDays(k,1)){
    const st=dayStatus(target,k);
    if(!st.scheduled || st.complete) continue;
    for(const name of st.missing){
      counts[name]=(counts[name]||0)+1;
    }
  }

  return counts;
}

function mergeCounts(base,extra){
  for(const [name,count] of Object.entries(extra)){
    base[name]=(base[name]||0)+count;
  }
  return base;
}

function yesterdayReport(target){
  const d=new Date();
  d.setDate(d.getDate()-1);
  const y=localKey(d);
  const st=dayStatus(target,y);

  if(!st.scheduled) return "";

  if(st.complete){
    return `<div class="reportbox reportok">
      <div class="reporttitle">어제 결과</div>
      <div>🎉 ${st.done}/${st.scheduled} 완료 · 성공</div>
    </div>`;
  }

  const ended=streakBeforeDate(target,y);
  return `<div class="reportbox reportfail">
    <div class="reporttitle">어제 실패 원인</div>
    <div class="reportmissing">${st.missing.map(x=>`❌ ${x}`).join("<br>")}</div>
    ${ended>0?`<div class="reportsub">연속 ${ended}일이 종료되었습니다.</div>`:""}
  </div>`;
}

// ── 홈 ──
function renderHome(){
  const t=td();
  const el=document.getElementById("vh");

// 홈 프로젝트 순서 변경: 손잡이를 누른 채 위아래로 이동
function initProjectReorder(){
  const list=document.querySelector("#vh .list");
  if(!list)return;

  list.querySelectorAll(".drag-handle").forEach(handle=>{
    handle.setAttribute("draggable","false");
    handle.oncontextmenu=e=>e.preventDefault();

    let card=null;
    let startY=0;
    let active=false;
    let moved=false;

    const pointY=e=>{
      if(e.touches && e.touches[0]) return e.touches[0].clientY;
      if(e.changedTouches && e.changedTouches[0]) return e.changedTouches[0].clientY;
      return e.clientY;
    };

    const moveCard=y=>{
      const hit=document.elementFromPoint(window.innerWidth/2,y);
      const target=hit?.closest?.(".project-card");
      if(!target || target===card || !list.contains(target))return;

      const rect=target.getBoundingClientRect();
      const before=y < rect.top + rect.height/2;
      list.insertBefore(card,before?target:target.nextSibling);
    };

    const move=e=>{
      if(!active)return;
      const y=pointY(e);
      if(Math.abs(y-startY)>4)moved=true;
      if(moved){
        e.preventDefault();
        moveCard(y);
      }
    };

    const finish=e=>{
      if(!active)return;
      active=false;

      document.removeEventListener("mousemove",move);
      document.removeEventListener("mouseup",finish);
      document.removeEventListener("touchmove",move);
      document.removeEventListener("touchend",finish);
      document.removeEventListener("touchcancel",finish);

      card?.classList.remove("dragging");
      document.body.style.userSelect="";
      document.body.style.webkitUserSelect="";

      if(!moved)return;

      const order=Array.from(list.querySelectorAll(".project-card")).map(x=>x.dataset.projectId);
      const byId=new Map(db.p.map(p=>[p.id,p]));
      db.p=order.map(id=>byId.get(id)).filter(Boolean);
      sv();
      renderHome();
    };

    const start=e=>{
      if(e.type==="mousedown" && e.button!==0)return;
      e.preventDefault();
      e.stopPropagation();

      card=handle.closest(".project-card");
      if(!card)return;

      startY=pointY(e);
      active=true;
      moved=false;
      card.classList.add("dragging");
      document.body.style.userSelect="none";
      document.body.style.webkitUserSelect="none";

      document.addEventListener("mousemove",move,{passive:false});
      document.addEventListener("mouseup",finish);
      document.addEventListener("touchmove",move,{passive:false});
      document.addEventListener("touchend",finish);
      document.addEventListener("touchcancel",finish);
    };

    handle.addEventListener("mousedown",start);
    handle.addEventListener("touchstart",start,{passive:false});
  });
}

function toggleExp(key){exp[key]=!exp[key];}
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}
function getFailure(date,id){return db.failures?.[date]?.[id]||null;}
function removeFailure(date,id){
  if(db.failures?.[date]){
    delete db.failures[date][id];
    if(!Object.keys(db.failures[date]).length)delete db.failures[date];
  }
}
function toggleLog(id,date){
  const t=date||td();if(!db.logs[t])db.logs[t]={};
  const next=!db.logs[t][id];
  db.logs[t][id]=next;
  if(next)removeFailure(t,id);
  sv();
}
let failCtx={date:null,id:null,name:""};
function openFailModal(id,name,date){
  const t=date||td();failCtx={date:t,id,name};
  const rec=getFailure(t,id);
  document.getElementById("mfailt").textContent=`${name} · 실패 이유`;
  document.querySelectorAll("#mfailreasons .reason-chip").forEach(b=>b.classList.toggle("sel",!!rec?.reasons?.includes(b.dataset.v)));
  document.getElementById("mfailmemo").value=rec?.memo||"";
  om("mfail");
}
document.querySelectorAll("#mfailreasons .reason-chip").forEach(b=>b.onclick=()=>b.classList.toggle("sel"));
function saveFailureRecord(){
  const {date,id}=failCtx;if(!date||!id)return;
  const reasons=Array.from(document.querySelectorAll("#mfailreasons .reason-chip.sel")).map(b=>b.dataset.v);
  const memo=document.getElementById("mfailmemo").value.trim();
  if(!db.failures[date])db.failures[date]={};
  db.failures[date][id]={reasons,memo,updatedAt:new Date().toISOString()};
  if(!db.logs[date])db.logs[date]={};
  db.logs[date][id]=false;
  sv();cm("mfail");renderDetail();
}
function clearFailureRecord(){
  const {date,id}=failCtx;if(!date||!id)return;
  removeFailure(date,id);
  if(db.logs[date])delete db.logs[date][id];
  sv();cm("mfail");renderDetail();
}
function failureRecordHtml(proj,date){
  const ids=gItems(proj,date), names=itemNameMap(proj), log=db.logs[date]||{};
  const rows=ids.filter(id=>!log[id]).map(id=>{
    const rec=getFailure(date,id);
    const reason=rec?.reasons?.length?rec.reasons.join(", "):"이유 미입력";
    const memo=rec?.memo?`<div class="history-reason">메모: ${esc(rec.memo)}</div>`:"";
    return `<div class="history-item"><div class="history-head"><span>${esc(names[id]||"이름 없음")}</span><span>${rec?"❌ 실패":"○ 미기록"}</span></div><div class="history-reason">이유: ${esc(reason)}</div>${memo}</div>`;
  });
  return rows.length?`<div class="day-history">${rows.join("")}</div>`:"";
}

  if(!db.ms[proj.id])db.ms[proj.id]={};
  for(const ms of MS){
    if(day===ms.d&&!db.ms[proj.id][ms.d]){
      db.ms[proj.id][ms.d]=true;sv();
      document.getElementById("msemoji").textContent=ms.e;
      document.getElementById("mstitle").textContent=ms.t;
      document.getElementById("msdesc").textContent=ms.s;
      document.getElementById("mspop").style.display="block";
      break;
    }
  }
}

function openImportProjects(){
  const target=db.p.find(p=>p.id===epid);
  if(!target)return;

  // 현재 구조에서 안전하게 기록을 온전히 보존할 수 있는 단독 프로젝트만 표시
  const candidates=db.p.filter(p=>p.id!==target.id && (!p.cats || p.cats.length===0));
  const el=document.getElementById("importlist");

  if(!candidates.length){
    el.innerHTML=`<div class="import-empty">가져올 수 있는 단독 프로젝트가 없습니다.<br>카테고리가 없는 프로젝트만 이동할 수 있어요.</div>`;
  }else{
    el.innerHTML=candidates.map(p=>`
      <label class="import-item">
        <input type="checkbox" value="${p.id}">
        <div class="cbar" style="background:${p.color}"></div>
        <div style="flex:1">
          <div class="import-name">${esc(p.name)}</div>
          <div class="import-meta">${p.type==="bad"?"나쁜 습관 끊기":"좋은 습관"} · ${fl(p.days,p.freq||1)} · ${fd(p.start)} 시작</div>
        </div>
      </label>
    `).join("");
  }
  cm("mp");
  om("mimport");
}

document.getElementById("mpimport").onclick=openImportProjects;

document.getElementById("importok").onclick=()=>{
  const target=db.p.find(p=>p.id===epid);
  if(!target)return;

  const selected=Array.from(document.querySelectorAll("#importlist input[type=checkbox]:checked")).map(x=>x.value);
  if(!selected.length)return;

  const moving=db.p.filter(p=>selected.includes(p.id) && p.id!==target.id && (!p.cats || p.cats.length===0));
  if(!moving.length)return;

  if(!target.cats) target.cats=[];

  // 부모는 제목 전용 묶음으로 전환
  target.isGroup=true;

  // 부모가 예전에 단독 습관이었을 때 남아 있던 기록 제거
  for(const date of Object.keys(db.logs||{})){
    if(Object.prototype.hasOwnProperty.call(db.logs[date]||{},target.id)){
      delete db.logs[date][target.id];
      if(!Object.keys(db.logs[date]).length) delete db.logs[date];
    }
  }
  for(const date of Object.keys(db.failures||{})){
    if(Object.prototype.hasOwnProperty.call(db.failures[date]||{},target.id)){
      delete db.failures[date][target.id];
      if(!Object.keys(db.failures[date]).length) delete db.failures[date];
    }
  }

  const existingIds=new Set(target.cats.map(c=>c.id));
  for(const p of moving){
    if(existingIds.has(p.id)) continue;
    target.cats.push({
      id:p.id,
      name:p.name,
      type:p.type,
      days:[...(p.days||[])],
      freq:p.freq||1,
      color:p.color,
      start:p.start,
      subs:[...(p.subs||[])]
    });
  }

  // 선택한 단독 프로젝트만 최상위 목록에서 제거
  const movingIds=new Set(moving.map(p=>p.id));
  db.p=db.p.filter(p=>!movingIds.has(p.id));

  // 묶음 시작일은 실제 자식 기준으로 재계산
  target.start=projectRealStart(target);
  exp["p_"+target.id]=true;

  sv();
  cm("mimport");
  renderHome();
};

document.getElementById("mpdel").onclick=()=>{

document.getElementById("mcexport").onclick=()=>{
  const parent=db.p.find(p=>p.id===ecpid);
  const cat=parent?.cats?.find(c=>c.id===ecid);
  if(!parent || !cat)return;

  // 세부 습관이 있는 카테고리는 구조를 잃지 않도록 한 개 카테고리를 가진 독립 프로젝트로 내보낸다.
  let exported;
  if(cat.subs && cat.subs.length){
    exported={
      id:uid(),
      name:cat.name,
      start:cat.start||td(),
      type:cat.type||"good",
      days:[...(cat.days||[])],
      freq:cat.freq||1,
      color:cat.color||parent.color||"#4ade80",
      cats:[{
        id:cat.id,
        name:cat.name,
        start:cat.start||td(),
        type:cat.type||"good",
        days:[...(cat.days||[])],
        freq:cat.freq||1,
        color:cat.color||parent.color||"#4ade80",
        subs:(cat.subs||[]).map(s=>({...s,days:[...(s.days||[])]}))
      }],
      isGroup:true
    };
  }else{
    // 원래 가져온 단독 프로젝트는 같은 ID를 유지해 기록과 통계를 그대로 연결
    exported={
      id:cat.id,
      name:cat.name,
      start:cat.start||td(),
      type:cat.type||"good",
      days:[...(cat.days||[])],
      freq:cat.freq||1,
      color:cat.color||parent.color||"#4ade80",
      cats:[]
    };
  }

  parent.cats=parent.cats.filter(c=>c.id!==cat.id);

  const parentIndex=db.p.findIndex(p=>p.id===parent.id);
  db.p.splice(parentIndex+1,0,exported);

  // 마지막 카테고리까지 내보냈다면 빈 제목 묶음은 자동 제거
  if(parent.cats.length===0){
    db.p=db.p.filter(p=>p.id!==parent.id);
  }else{
    parent.start=projectRealStart(parent);
  }

  sv();
  cm("mc");
  curP=exported.id;
  renderHome();
};

document.getElementById("mcdel").onclick=()=>{

function renderStats(){
  const el=document.getElementById("sc");
  if(!db.p.length){
    el.innerHTML=`<div class="empty">아직 프로젝트가 없어요.</div>`;
    return;
  }

  const today=td();
  const statsCutoff=addDays(today,-1);
  const d7=new Date(statsCutoff+"T00:00:00");
  d7.setDate(d7.getDate()-6);
  const weekStart=localKey(d7);

  const dm=new Date();
  const monthStart=[dm.getFullYear(),String(dm.getMonth()+1).padStart(2,"0"),"01"].join("-");

  const futureProjects=db.p.filter(proj=>targetIsFuture({kind:"project",proj},today));
  const projectRows=db.p.filter(proj=>!targetIsFuture({kind:"project",proj},statsCutoff)).map(proj=>{
    const target={kind:"project",proj};
    const all=targetStats(target,null,statsCutoff);
    const week=targetStats(target,weekStart,statsCutoff);
    const month=targetStats(target,monthStart,statsCutoff);
    const cur=currentStreak(target,statsCutoff);
    const best=bestStreak(target,statsCutoff);
    return {proj,target,all,week,month,cur,best};
  });

  const totalScheduled=projectRows.reduce((a,x)=>a+x.all.scheduledDays,0);
  const totalSuccess=projectRows.reduce((a,x)=>a+x.all.successDays,0);
  const totalDone=projectRows.reduce((a,x)=>a+x.all.doneItems,0);
  const overallRate=totalScheduled?Math.round(totalSuccess/totalScheduled*100):0;
  const maxCurrent=Math.max(0,...projectRows.map(x=>x.cur));
  const maxBest=Math.max(0,...projectRows.map(x=>x.best));

  const monthlyFailureCounts={};
  for(const row of projectRows){
    mergeCounts(monthlyFailureCounts,failureCounts(row.target,monthStart,statsCutoff));
  }
  const failureTop=Object.entries(monthlyFailureCounts)
    .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))
    .slice(0,10);

  const top=projectRows
    .slice()
    .sort((a,b)=>b.cur-a.cur || b.best-a.best || b.all.rate-a.all.rate)
    .slice(0,5);

  let summaryHtml=`
    <div class="stcard">
      <div class="dashgrid">
        <div class="dashitem"><div class="dashlbl">최고 현재 연속</div><div class="dashval">${maxCurrent}일 🔥</div></div>
        <div class="dashitem"><div class="dashlbl">전체 최고 연속</div><div class="dashval">${maxBest}일 🏆</div></div>
        <div class="dashitem"><div class="dashlbl">전체 성공률</div><div class="dashval">${overallRate}%</div></div>
        <div class="dashitem"><div class="dashlbl">총 완료 체크</div><div class="dashval">${totalDone}회</div></div>
      </div>
    </div>
    ${futureProjects.length?`<div class="stcard"><div class="stpn" style="margin-bottom:8px">⏳ 시작 예정</div>${futureProjects.map(p=>`<div class="rankrow"><div class="rankname">${esc(p.name)}</div><div class="rankval" style="color:#fbbf24">${scheduledText(projectRealStart(p),today)}</div></div>`).join("")}</div>`:""}

    <div class="stcard">
      <div class="stpn" style="margin-bottom:8px">🏅 TOP 5</div>
      ${top.map((x,i)=>`<div class="rankrow">
        <div class="ranknum">${i+1}</div>
        <div class="rankname">${x.proj.name}</div>
        <div class="rankval">🔥 ${x.cur}일</div>
      </div>`).join("")}
    </div>`;

  let projectsHtml="";
  let analysisReports="";

  for(const row of projectRows){
    const {proj,target,all,week,month,cur,best}=row;
    const sm=statusMessage(target,statsCutoff);
    const projDay=dd(projectRealStart(proj),statsCutoff)+1;

    const recent=[];
    for(let i=6;i>=0;i--){
      const d=new Date(statsCutoff+"T00:00:00");
      d.setDate(d.getDate()-i);
      const k=localKey(d);
      const st=dayStatus(target,k);
      recent.push({
        label:["일","월","화","수","목","금","토"][d.getDay()],
        cls:!st.scheduled?"off":st.complete?"ok":"fail",
        title:!st.scheduled?"예정 없음":st.complete?"성공":`${st.done}/${st.scheduled}`
      });
    }

    let catHtml="";
    if(proj.cats && proj.cats.length){
      catHtml=proj.cats.map(cat=>{
        const ct={kind:"category",proj,cat};
        const cs=targetStats(ct,null,statsCutoff);
        const ccur=currentStreak(ct,statsCutoff);
        const cbest=bestStreak(ct,statsCutoff);
        const csm=statusMessage(ct,statsCutoff);
        return `<div class="catstat">
          <div class="catstathead">
            <div class="cbar" style="background:${cat.color};height:15px"></div>
            <div class="catstatname">${cat.name}</div>
            <div class="catstatnums">🔥${ccur} · 🏆${cbest} · ${cs.rate}%</div>
          </div>
          <div class="statusline ${csm.cls}">${csm.text}</div>
        </div>`;
      }).join("");
    }

    const achieved=MS.filter(m=>projDay>=m.d);
    const next=MS.find(m=>projDay<m.d);
    const msBadges=achieved.map(m=>`<span style="font-size:15px">${m.e}</span>`).join("");
    const detailId=`statproj-${proj.id}`;

    projectsHtml+=`
      <button class="project-list-btn" onclick="toggleProjectDetail('${detailId}',this)">
        <div class="cbar" style="background:${proj.color};height:18px"></div>
        <div class="project-list-name">${proj.name}</div>
        <div class="project-list-stat">🔥 ${cur}일 · ${all.rate}%</div>
        <div class="project-arrow">›</div>
      </button>

      <div class="project-detail" id="${detailId}">
        <div class="stcard">
          <div class="stch" style="margin-bottom:10px">
            <div class="cbar" style="background:${proj.color};height:18px"></div>
            <div class="stpn">${proj.name}</div>

          </div>

          <div class="dashgrid">

            <div class="dashitem"><div class="dashlbl">최고 연속</div><div class="dashval">${best}일</div></div>
            <div class="dashitem"><div class="dashlbl">전체 성공률</div><div class="dashval">${all.rate}%</div></div>
            <div class="dashitem"><div class="dashlbl">총 완료</div><div class="dashval">${all.doneItems}회</div></div>

          </div>

            ${recent.map(x=>`<div class="heatday ${x.cls}" title="${x.title}">${x.label}</div>`).join("")}

          <div style="margin-top:12px">

                <span>다음 목표 ${next.e} D+${next.d}</span><span>${projDay}/${next.d}일</span>
              </div>
              <div class="barbg"><div class="barfill" style="background:${proj.color};width:${Math.min(projDay/next.d*100,100)}%"></div></div>
            </div>`:""}
          </div>
        </div>
      </div>`;

    analysisReports+=`
      <div class="stcard">
        <div class="stch" style="margin-bottom:8px">
          <div class="cbar" style="background:${proj.color};height:18px"></div>
          <div class="stpn">${proj.name}</div>
        </div>
        ${yesterdayReport(target)}
      </div>`;
  }

  const analysisHtml=`
    <div class="stcard">
      <div class="stpn" style="margin-bottom:4px">📊 이번 달 가장 많이 놓친 습관</div>
      ${failureTop.length
        ?failureTop.map((x,i)=>`<div class="failrank">
            <div class="ranknum">${i<3?["🥇","🥈","🥉"][i]:i+1}</div>
            <div class="failname">${x[0]}</div>
            <div class="failcount">${x[1]}회</div>
          </div>`).join("")
        :`<div class="statusline statusok">이번 달에는 기록된 실패가 없습니다.</div>`}
    </div>
    ${analysisReports}`;

  el.innerHTML=`
    <div class="stat-tabs">
      <button class="stat-tab ${currentStatsTab==="summary"?"active":""}" data-tab="summary" onclick="showStatsTab('summary')">요약</button>
      <button class="stat-tab ${currentStatsTab==="projects"?"active":""}" data-tab="projects" onclick="showStatsTab('projects')">프로젝트</button>
      <button class="stat-tab ${currentStatsTab==="analysis"?"active":""}" data-tab="analysis" onclick="showStatsTab('analysis')">분석</button>
    </div>

function toggleExport(){
  const area=document.getElementById("export-area");
  area.style.display=area.style.display==="none"?"block":"none";
}

function backupFileName(){
  const d=new Date();
  const p=n=>String(n).padStart(2,"0");
  return `천_쑥과마늘_백업_${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}_${p(d.getHours())}-${p(d.getMinutes())}.json`;
}

async function exportJsonFile(){
  try{
    const json=JSON.stringify(db,null,2);
    const file=new File([json],backupFileName(),{type:"application/json"});

    // iPhone Safari: 공유 시트에서 파일, 메모, AirDrop 등을 선택
    if(navigator.share && (!navigator.canShare || navigator.canShare({files:[file]}))){
      await navigator.share({files:[file],title:"천 쑥과마늘 백업"});
      return;
    }

    // 공유 기능이 없는 브라우저: 일반 파일 다운로드
    const url=URL.createObjectURL(file);
    const a=document.createElement("a");
    a.href=url;
    a.download=file.name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    alert("JSON 백업 파일을 저장했습니다.");
  }catch(err){
    if(err && err.name==="AbortError")return;
    console.error(err);
    // 최후의 대안: 텍스트를 표시해 데이터 자체는 잃지 않도록 함
    const txt=document.getElementById("export-text");
    if(txt){
      txt.value=JSON.stringify(db,null,2);
      txt.closest("details").open=true;
    }
    alert("파일 공유를 열지 못해 JSON 내용을 아래에 표시했습니다.");
  }
}

async function importJsonFile(event){
  const input=event.target;
  const file=input.files && input.files[0];
  if(!file)return;
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data || typeof data!=="object" || Array.isArray(data))throw new Error("invalid backup");
    if(!confirm("현재 데이터를 선택한 백업으로 바꿀까요?"))return;
    db=normalizeDb(data);
    sv();
    alert("백업을 복원했습니다.");
    location.reload();
  }catch(err){
    console.error(err);
    alert("올바른 JSON 백업 파일이 아닙니다.");
  }finally{
    input.value="";
  }
}

function loadFromText(){
  try{
    const data=JSON.parse(document.getElementById("export-text").value);
    if(!data || typeof data!=="object" || Array.isArray(data))throw new Error("invalid backup");
    if(!confirm("현재 데이터를 붙여넣은 백업으로 바꿀까요?"))return;
    db=normalizeDb(data);sv();alert("백업을 복원했습니다.");location.reload();
  }catch{alert("형식이 올바르지 않아요.");}
}

async function syncToSupabase(){
  try{
    await fetch(`${SUPA_URL}/rest/v1/cheon_data?id=eq.main`,{
      method:"PATCH",
      headers:{"Content-Type":"application/json","apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`,"Prefer":"return=minimal"},
      body:JSON.stringify({data:db, updated_at:db.updatedAt||new Date().toISOString()})
    });
  }catch(e){console.log("sync error",e);}
}

async function loadFromSupabase(){
  try{
    const localDb=readLocalDb();
    const res=await fetch(`${SUPA_URL}/rest/v1/cheon_data?id=eq.main&select=data,updated_at`,{
      headers:{"apikey":SUPA_KEY,"Authorization":`Bearer ${SUPA_KEY}`}
    });
    if(!res.ok)throw new Error(`Supabase load failed: ${res.status}`);
    const rows=await res.json();
    const serverRow=rows&&rows[0];
    const serverDb=serverRow?.data;

    if(!serverDb||!serverDb.p)return false;

    const localHasData=!!(localDb&&Array.isArray(localDb.p)&&(localDb.p.length||Object.keys(localDb.logs||{}).length));
    const localTime=localDb?.updatedAt?Date.parse(localDb.updatedAt):0;
    const serverTime=Date.parse(serverRow.updated_at||serverDb.updatedAt||0)||0;

    // 기존 버전처럼 로컬에 수정 시간이 없더라도 데이터가 있으면 먼저 보존한다.
    if(localHasData&&(!localTime||localTime>serverTime)){
      db=normalizeDb(localDb);
      if(!db.updatedAt)db.updatedAt=new Date().toISOString();
      localStorage.setItem(KEY,JSON.stringify(db));
      await syncToSupabase();
      return true;
    }

    db=normalizeDb(serverDb);
    db.updatedAt=serverRow.updated_at||serverDb.updatedAt||new Date().toISOString();
    localStorage.setItem(KEY,JSON.stringify(db));
    return true;
  }catch(e){console.log("load error",e);}
  return false;
}
